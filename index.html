<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Matrix - SSP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f8fafc; }
        .data-cell { min-height: 60px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="font-sans text-slate-900">

    <div class="flex h-screen w-full overflow-hidden">
        
        <!-- LEFT PANEL: LOGIC KEY -->
        <div class="w-80 bg-white border-r border-slate-200 flex flex-col shadow-xl z-10">
            
            <!-- Header -->
            <div class="p-6 border-b border-slate-100">
                <h1 class="text-xl font-bold tracking-tighter text-slate-800 uppercase">
                    Geometric Matrix
                </h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">
                    Symmetric Span Protocol
                </p>
            </div>

            <!-- SSP SYMMETRY MATRIX INPUTS -->
            <div class="p-6 space-y-6">
                <div class="space-y-3">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Symmetry Matrix</p>
                    
                    <div class="flex items-center justify-between p-2 bg-slate-50 border border-slate-200 rounded-md">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Anchor (a)</label>
                        <input type="number" id="in-a" step="any" class="w-24 text-right bg-transparent font-mono font-bold outline-none text-slate-700" placeholder="0">
                    </div>
                    <div class="flex items-center justify-between p-2 bg-slate-50 border border-slate-200 rounded-md">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Centroid (b)</label>
                        <input type="number" id="in-b" step="any" class="w-24 text-right bg-transparent font-mono font-bold outline-none text-slate-700" placeholder="0">
                    </div>
                    <div class="flex items-center justify-between p-2 bg-slate-50 border border-slate-200 rounded-md">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Span (c)</label>
                        <input type="number" id="in-c" step="any" class="w-24 text-right bg-transparent font-mono font-bold outline-none text-slate-700" placeholder="0">
                    </div>
                    <div class="flex items-center justify-between p-2 bg-slate-50 border border-slate-200 rounded-md">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Boundary (d)</label>
                        <input type="number" id="in-d" step="any" class="w-24 text-right bg-transparent font-mono font-bold outline-none text-slate-700" placeholder="0">
                    </div>
                </div>

                <!-- DERIVED STRUCTURAL DATA -->
                <div class="space-y-2 pt-4">
                    <div class="p-3 bg-slate-50 border border-slate-100 rounded-md data-cell flex flex-col justify-center">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Structural Drift (Δ)</span>
                        <div class="flex items-baseline gap-2">
                            <span id="out-delta" class="text-sm font-mono font-semibold text-slate-700">---</span>
                            <span id="out-label" class="text-[10px] text-blue-500 font-medium"></span>
                        </div>
                    </div>
                    <div class="p-3 bg-slate-50 border border-slate-100 rounded-md data-cell flex flex-col justify-center">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Radius (R)</span>
                        <span id="out-r" class="text-sm font-mono font-semibold text-slate-700">---</span>
                    </div>
                    <div class="p-3 bg-slate-50 border border-slate-100 rounded-md data-cell flex flex-col justify-center">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Circumference (C)</span>
                        <span id="out-c_total" class="text-sm font-mono font-semibold text-slate-700">---</span>
                    </div>
                </div>
            </div>

            <!-- Error Area -->
            <div id="error-box" class="hidden mt-auto p-6">
                <div class="flex items-start gap-2 p-3 bg-red-50 border border-red-100 text-red-600 rounded-md text-xs">
                    <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="error-text">Invalid Boundary</span>
                </div>
            </div>

            <!-- Watermark -->
            <div class="p-4 text-[10px] text-slate-300 font-medium tracking-widest uppercase text-center border-t border-slate-50">
                © 2026 Carolina Johnson (CJ)
            </div>
        </div>

        <!-- RIGHT PANEL: VISUALIZATION WINDOW -->
        <div class="flex-1 relative bg-slate-100 flex items-center justify-center p-12">
            <div id="canvas-container" class="relative shadow-2xl bg-white p-4 rounded-sm">
                <svg id="ssp-svg" width="600" height="600" viewBox="-350 -350 700 700" class="max-w-full max-h-full overflow-visible">
                    <rect id="svg-square" x="0" y="0" width="0" height="0" fill="none" stroke="#cbd5e1" stroke-width="2" />
                    <circle id="svg-circle" cx="0" cy="0" r="0" fill="none" stroke="#3b82f6" stroke-width="2" />
                    <polygon id="svg-triangle" points="" fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="3" stroke-linejoin="round" />
                    <circle cx="0" cy="0" r="4" fill="#1e293b" />
                    <text x="8" y="-8" font-size="12" fill="#64748b" font-weight="bold">S</text>
                </svg>
            </div>
            <div id="empty-state" class="hidden flex flex-col items-center justify-center text-slate-400 space-y-2">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="text-sm font-light">Enter at least two variables to initialize matrix</p>
            </div>
        </div>
    </div>

    <script>
        const inputs = {
            a: document.getElementById('in-a'),
            b: document.getElementById('in-b'),
            c: document.getElementById('in-c'),
            d: document.getElementById('in-d')
        };
        
        const outputs = {
            delta: document.getElementById('out-delta'),
            label: document.getElementById('out-label'),
            r: document.getElementById('out-r'),
            ctotal: document.getElementById('out-c_total')
        };

        const errorBox = document.getElementById('error-box');
        const canvasContainer = document.getElementById('canvas-container');
        const emptyState = document.getElementById('empty-state');
        const svgSquare = document.getElementById('svg-square');
        const svgCircle = document.getElementById('svg-circle');
        const svgTriangle = document.getElementById('svg-triangle');

        function solveMatrix() {
            let a = parseFloat(inputs.a.value);
            let b = parseFloat(inputs.b.value);
            let c = parseFloat(inputs.c.value);
            let d = parseFloat(inputs.d.value);

            // Check how many variables are provided
            const provided = [];
            if (!isNaN(a)) provided.push('a');
            if (!isNaN(b)) provided.push('b');
            if (!isNaN(c)) provided.push('c');
            if (!isNaN(d)) provided.push('d');

            if (provided.length < 2) {
                showError(false); // Hide error, but show empty state
                return;
            }

            // --- Tautological Solving ---
            // If we have a and d
            if (!isNaN(a) && !isNaN(d)) {
                b = (a + d) / 2;
                c = d - a;
            } 
            // If we have b and c
            else if (!isNaN(b) && !isNaN(c)) {
                a = b - (c / 2);
                d = b + (c / 2);
            }
            // If we have a and b
            else if (!isNaN(a) && !isNaN(b)) {
                d = 2 * b - a;
                c = d - a;
            }
            // If we have a and c
            else if (!isNaN(a) && !isNaN(c)) {
                d = a + c;
                b = (a + d) / 2;
            }
            // If we have b and d
            else if (!isNaN(b) && !isNaN(d)) {
                a = 2 * b - d;
                c = d - a;
            }
            // If we have c and d
            else if (!isNaN(c) && !isNaN(d)) {
                a = d - c;
                b = (a + d) / 2;
            }

            // Update the input fields to show the derived values
            inputs.a.value = a.toFixed(3);
            inputs.b.value = b.toFixed(3);
            inputs.c.value = c.toFixed(3);
            inputs.d.value = d.toFixed(3);

            if (a >= d) {
                showError(true, "Invalid Boundary (d must be > a)");
                return;
            }

            // --- Geometrical Computations ---
            const delta = (5 * a - d) * (a - d) / 4;
            let label = "Right (Rectangulo)";
            if (d < 5 * a) label = "Obtuse (Obtusangulo)";
            else if (d > 5 * a) label = "Acute (Acutangulo)";

            const xPeak = (b**2 + c**2 - d**2) / (2 * c);
            const yPeak = Math.sqrt(Math.max(0, b**2 - xPeak**2));
            const yc = (b**2 - (xPeak * c)) / (2 * yPeak);
            const radius = Math.sqrt((c/2)**2 + yc**2);
            const circumference = (22/7) * (2 * radius);

            // Update Text
            outputs.delta.innerText = delta.toFixed(3);
            outputs.label.innerText = label;
            outputs.r.innerText = radius.toFixed(3);
            outputs.ctotal.innerText = circumference.toFixed(3);

            // Update SVG
            svgSquare.setAttribute('x', -radius);
            svgSquare.setAttribute('y', -radius);
            svgSquare.setAttribute('width', 2 * radius);
            svgSquare.setAttribute('height', 2 * radius);
            svgCircle.setAttribute('r', radius);

            const v1 = `${-c/2},${-yc}`;
            const v2 = `${c/2},${-yc}`;
            const v3 = `${xPeak - c/2},${yPeak - yc}`;
            svgTriangle.setAttribute('points', `${v1} ${v2} ${v3}`);

            showError(false);
        }

        function showError(show, msg = "") {
            if (show) {
                errorBox.classList.remove('hidden');
                document.getElementById('error-text').innerText = msg;
                canvasContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                errorBox.classList.add('hidden');
                canvasContainer.classList.remove('hidden');
                emptyState.classList.add('hidden');
            }
        }

        // Event Listeners
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', solveMatrix);
        });

        // Initial Load
        solveMatrix();
    </script>
</body>
</html>
